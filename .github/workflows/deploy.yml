name: Release

on:
  push:
    tags:
      - "*"

jobs:
  wporg-deploy:
    name: Deploy to WordPress.org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        with:
          ASSETS_DIR: .wordpress-org

  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli-nightly.phar
          chmod +x wp-cli-nightly.phar
          sudo mv wp-cli-nightly.phar /usr/local/bin/wp

      - name: Install dist-archive command
        run: wp package install wp-cli/dist-archive-command

      - name: Build distribution zip
        run: wp dist-archive .

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the changelog section for this version from readme.txt
          NOTES=$(awk -v ver="$GITHUB_REF_NAME" '
            /^= / { if (found) exit; if ($0 == "= " ver " =") found=1; next }
            found { print }
          ' readme.txt)
          # Write to file to preserve newlines
          echo "$NOTES" > release-notes.txt
          cat release-notes.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.txt \
            ../opengraph-fallback-embed.$GITHUB_REF_NAME.zip
