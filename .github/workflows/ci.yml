name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-php:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPCS
        run: composer phpcs

  lint-js-css:
    name: JS & CSS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint CSS
        run: npm run lint:css

  test-php:
    name: PHP Tests
    runs-on: ubuntu-latest
    needs: [ lint-php, lint-js-css ]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start wp-env
        run: npx wp-env start --config=.wp-env.test.json

      - name: Install Composer dependencies in test container
        run: npx wp-env run cli --config=.wp-env.test.json --env-cwd=wp-content/plugins/opengraph-fallback-embed composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: npx wp-env run cli --config=.wp-env.test.json --env-cwd=wp-content/plugins/opengraph-fallback-embed vendor/bin/phpunit
