<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" width="1544" height="500">
  <defs>
    <linearGradient id="bg" x1="1544" y1="500" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e4976"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
    <clipPath id="gc">
      <circle cx="300" cy="250" r="100"/>
    </clipPath>
    <linearGradient id="l1" x1="420" y1="195" x2="880" y2="115" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5cb8f0"/>
      <stop offset="100%" stop-color="#5cb8f0" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="l2" x1="432" y1="250" x2="1050" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5cb8f0"/>
      <stop offset="100%" stop-color="#5cb8f0" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="l3" x1="420" y1="305" x2="880" y2="385" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5cb8f0"/>
      <stop offset="100%" stop-color="#5cb8f0" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="url(#bg)"/>

  <!-- Connection lines (from satellites to card edges) -->
  <path d="M420,195 C580,165 740,130 880,115" stroke="url(#l1)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M432,250 C630,250 840,250 1050,250" stroke="url(#l2)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M420,305 C580,335 740,370 880,385" stroke="url(#l3)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Satellite nodes -->
  <circle cx="420" cy="195" r="7" fill="#5cb8f0"/>
  <circle cx="432" cy="250" r="7" fill="#5cb8f0"/>
  <circle cx="420" cy="305" r="7" fill="#5cb8f0"/>

  <!-- Globe grid, clipped -->
  <g clip-path="url(#gc)" stroke="#7cc4f5" fill="none" stroke-width="4">
    <line x1="200" y1="250" x2="400" y2="250"/>
    <line x1="300" y1="150" x2="300" y2="350"/>
    <ellipse cx="300" cy="250" rx="39" ry="100"/>
    <ellipse cx="300" cy="250" rx="75" ry="100"/>
    <line x1="215" y1="200" x2="385" y2="200"/>
    <line x1="215" y1="300" x2="385" y2="300"/>
  </g>

  <!-- Globe outline -->
  <circle cx="300" cy="250" r="100" fill="none" stroke="#b8ddf5" stroke-width="5"/>

  <!-- Card 1 (top) -->
  <g>
    <rect x="880" y="50" width="280" height="130" rx="8" fill="white" fill-opacity="0.1"/>
    <rect x="890" y="60" width="260" height="55" rx="4" fill="#c9963a" fill-opacity="0.3"/>
    <rect x="890" y="126" width="140" height="8" rx="4" fill="white" fill-opacity="0.25"/>
    <rect x="890" y="142" width="100" height="6" rx="3" fill="white" fill-opacity="0.12"/>
    <rect x="890" y="154" width="120" height="6" rx="3" fill="white" fill-opacity="0.12"/>
  </g>

  <!-- Card 2 (middle, offset right) -->
  <g>
    <rect x="1050" y="185" width="280" height="130" rx="8" fill="white" fill-opacity="0.1"/>
    <rect x="1060" y="195" width="260" height="55" rx="4" fill="#4a8e7f" fill-opacity="0.3"/>
    <rect x="1060" y="261" width="150" height="8" rx="4" fill="white" fill-opacity="0.25"/>
    <rect x="1060" y="277" width="110" height="6" rx="3" fill="white" fill-opacity="0.12"/>
    <rect x="1060" y="289" width="90" height="6" rx="3" fill="white" fill-opacity="0.12"/>
  </g>

  <!-- Card 3 (bottom) -->
  <g>
    <rect x="880" y="320" width="280" height="130" rx="8" fill="white" fill-opacity="0.1"/>
    <rect x="890" y="330" width="260" height="55" rx="4" fill="#7b6ba5" fill-opacity="0.3"/>
    <rect x="890" y="396" width="130" height="8" rx="4" fill="white" fill-opacity="0.25"/>
    <rect x="890" y="412" width="90" height="6" rx="3" fill="white" fill-opacity="0.12"/>
    <rect x="890" y="424" width="110" height="6" rx="3" fill="white" fill-opacity="0.12"/>
  </g>
</svg>
